name: Update Readme with Dev Metrics

on:
  schedule:
    # runs at 4 PM UTC every day (0 AM UTC+8)
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Readme with Dev Metrics
    runs-on: ubuntu-latest
    steps:
      # Pin to commit SHA to prevent supply chain attacks
      - uses: anmol098/waka-readme-stats@6a2ec228c5ab57e173ac03586902a0b06b8f9301 # master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          SHOW_PROJECTS: False
          SHOW_LOC_CHART: False
          SHOW_LANGUAGE_PER_REPO: False
          COMMIT_MESSAGE: "chore: Update README with Dev Metrics"
